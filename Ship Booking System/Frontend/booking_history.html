<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passage Reservations & Tickets - Oceania Direct</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="brand">
      <div class="brand-logo-icon"><i class="fa-solid fa-water-ladder"></i></div>
      Oceania Direct
    </a>
    <ul class="nav-menu">
      <li><a href="index.html" class="nav-link">Home</a></li>
      <li><a href="ships.html" class="nav-link">Fleet</a></li>
      <li><a href="booking_history.html" class="nav-link active">Reservations</a></li>
      <li><a href="passenger_dashboard.html" class="nav-link">Dashboard</a></li>
    </ul>
    <div id="nav-auth-container"></div>
  </nav>

  <main class="container">
    
    <div style="margin-bottom: 2.5rem;">
      <span class="hero-tag"><i class="fa-solid fa-clock-rotate-left"></i> Passenger History</span>
      <h1 class="hero-heading text-gradient" style="font-size: 3rem;">Voyage Reservations & Vouchers</h1>
      <p style="color: rgba(255,255,255,0.75);">View boarding passes, download ticket vouchers, and manage upcoming sea itineraries.</p>
    </div>

    <!-- Filter Buttons -->
    <div style="display: flex; gap: 12px; margin-bottom: 2.5rem; overflow-x: auto;">
      <button class="btn btn-gold btn-sm" id="btn-all" onclick="filterHistory('All')">All Bookings</button>
      <button class="btn btn-glass btn-sm" id="btn-upcoming" onclick="filterHistory('Upcoming')">Upcoming Voyages</button>
      <button class="btn btn-glass btn-sm" id="btn-completed" onclick="filterHistory('Completed')">Completed Trips</button>
      <button class="btn btn-glass btn-sm" id="btn-cancelled" onclick="filterHistory('Cancelled')">Cancelled</button>
    </div>

    <!-- Reservations Timeline Cards -->
    <div id="history-container" style="display: flex; flex-direction: column; gap: 1.8rem; margin-bottom: 4rem;">
      <!-- Loaded dynamically -->
    </div>

  </main>

  <footer class="footer">
    <div style="max-width: 1380px; margin: 0 auto; text-align: center; color: rgba(255,255,255,0.4); font-size: 0.85rem;">
      &copy; 2026 Oceania Direct Maritime Systems.
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    let rawBookings = [];
    let rawPayments = [];
    let currentFilter = 'All';

    async function loadHistory() {
      try {
        const [bookings, payments] = await Promise.all([
          apiFetch('/bookings/'),
          apiFetch('/payments/')
        ]);
        rawBookings = bookings;
        rawPayments = payments;
        renderHistory();
      } catch (err) {
        showToast("Error retrieving reservations from API", "error");
      }
    }

    function renderHistory() {
      const container = document.getElementById('history-container');
      const user = getCurrentUser();

      let filtered = rawBookings;
      if (user && user.role !== 'Admin') {
        filtered = rawBookings.filter(b => b.passenger_name.toLowerCase().includes(user.full_name.toLowerCase()) || user.full_name.toLowerCase().includes(b.passenger_name.toLowerCase()));
      }

      if (currentFilter === 'Upcoming') filtered = filtered.filter(b => b.booking_status === 'Confirmed');
      else if (currentFilter === 'Completed') filtered = filtered.filter(b => b.booking_status === 'Completed');
      else if (currentFilter === 'Cancelled') filtered = filtered.filter(b => b.booking_status === 'Cancelled');

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="glass-panel" style="padding: 4rem; text-align: center;">
            <i class="fa-solid fa-ticket" style="font-size: 3rem; color: var(--turquoise); margin-bottom: 1rem;"></i>
            <h3>No reservations found under this view</h3>
            <p style="color: rgba(255,255,255,0.6); margin-top: 0.5rem;">Book a new voyage to see your boarding pass voucher here.</p>
            <a href="ships.html" class="btn btn-gold btn-sm" style="margin-top: 1.5rem;">Explore Ships</a>
          </div>
        `;
        return;
      }

      container.innerHTML = filtered.map(b => {
        const payment = rawPayments.find(p => p.booking_id === b.booking_id) || {
          payment_status: "Success",
          payment_method: "UPI",
          transaction_id: "TXN789456123"
        };

        const isCancelled = b.booking_status === 'Cancelled';

        return `
          <div class="glass-panel" style="padding: 2rem; display: flex; flex-direction: column; gap: 1.2rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem; flex-wrap: wrap; gap: 10px;">
              <div>
                <span style="font-size: 0.8rem; color: rgba(255,255,255,0.6);">Booking Code</span>
                <h3 style="color: var(--turquoise); font-size: 1.4rem;">#BK-${b.booking_id}</h3>
              </div>
              <div style="display: flex; gap: 10px; align-items: center;">
                <span class="badge-status ${b.booking_status === 'Confirmed' ? 'badge-active' : (b.booking_status === 'Completed' ? 'badge-active' : 'badge-inactive')}" style="position:static;">${b.booking_status}</span>
                <span class="badge-status badge-active" style="position:static; background:rgba(244,197,66,0.2); color:var(--gold-accent); border-color:var(--gold-accent);">${payment.payment_status} (${payment.payment_method})</span>
              </div>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; align-items: center;">
              <div>
                <span style="font-size: 0.8rem; color: rgba(255,255,255,0.6);">Passenger</span>
                <h4 style="font-size: 1.1rem; color: var(--pure-white);">${b.passenger_name}</h4>
              </div>
              <div>
                <span style="font-size: 0.8rem; color: rgba(255,255,255,0.6);">Vessel & Suite</span>
                <h4 style="font-size: 1.1rem; color: var(--gold-accent);">${b.ship_name} (${b.cabin_type})</h4>
              </div>
              <div>
                <span style="font-size: 0.8rem; color: rgba(255,255,255,0.6);">Route</span>
                <h4 style="font-size: 1.05rem;">${b.source_port} ➔ ${b.destination_port}</h4>
              </div>
              <div>
                <span style="font-size: 0.8rem; color: rgba(255,255,255,0.6);">Departure Date</span>
                <h4 style="font-size: 1.05rem; color: var(--turquoise);"><i class="fa-solid fa-calendar-day"></i> ${b.journey_date}</h4>
              </div>
              <div style="text-align: right;">
                <span style="font-size: 0.8rem; color: rgba(255,255,255,0.6); display: block;">Total Fare</span>
                <div class="fare-price" style="font-size: 1.8rem;">₹${b.total_amount.toLocaleString()}</div>
              </div>
            </div>

            <div style="border-top: 1px solid var(--glass-border); padding-top: 1rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
              <span style="font-size: 0.82rem; color: rgba(255,255,255,0.5);">Txn Ref: ${payment.transaction_id || 'TXN501'}</span>
              <div style="display: flex; gap: 10px;">
                <button onclick="window.print()" class="btn btn-glass btn-sm"><i class="fa-solid fa-print"></i> Print Voucher</button>
                ${!isCancelled ? `
                  <button onclick="cancelBooking(${b.booking_id})" class="btn btn-danger btn-sm"><i class="fa-solid fa-ban"></i> Cancel Voyage</button>
                ` : `<span style="font-size:0.85rem; color:var(--danger);">Cancelled</span>`}
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function filterHistory(type) {
      currentFilter = type;
      ['all', 'upcoming', 'completed', 'cancelled'].forEach(t => {
        const btn = document.getElementById(`btn-${t}`);
        if (btn) {
          btn.className = (t.toLowerCase() === type.toLowerCase()) ? 'btn btn-gold btn-sm' : 'btn btn-glass btn-sm';
        }
      });
      renderHistory();
    }

    async function cancelBooking(id) {
      if (!confirm("Are you sure you wish to cancel this ocean booking reservation?")) return;

      try {
        await apiFetch(`/bookings/update/${id}/`, 'PUT', { booking_status: "Cancelled" });
        showToast("Reservation status updated to Cancelled", "info");
        loadHistory();
      } catch (err) {
        showToast(err.message || "Failed to cancel booking", "error");
      }
    }

    document.addEventListener('DOMContentLoaded', loadHistory);
  </script>
</body>
</html>
