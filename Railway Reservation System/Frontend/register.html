<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passenger Registration - RailExpress</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="brand-logo">
        <div class="brand-icon">🚆</div>
        <div class="brand-text">Rail<span>Express</span></div>
      </a>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="trains.html" class="nav-link">Search Trains</a></li>
        <li><a href="booking_history.html" class="nav-link">PNR / Bookings</a></li>
      </ul>
      <div id="nav-user-area"></div>
    </div>
  </nav>

  <!-- Main Wrapper -->
  <main class="main-wrapper" style="max-width: 650px;">
    
    <div class="glass-panel" style="padding: 2.5rem;">
      <div style="text-align: center; margin-bottom: 2rem;">
        <h1 style="font-size: 1.8rem; font-weight: 800; margin-bottom: 0.5rem;">Create Passenger Profile</h1>
        <p style="color: var(--text-muted); font-size: 0.9rem;">Register to book tickets, manage reservations, and track PNR</p>
      </div>

      <form id="register-form">
        <input type="hidden" id="reg-id" value="">

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" id="reg-name" class="form-control" placeholder="e.g. Rahul Sharma" required>
          </div>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" id="reg-email" class="form-control" placeholder="rahul@example.com" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input type="text" id="reg-phone" class="form-control" placeholder="9876543210" required>
          </div>
          <div class="form-group">
            <label class="form-label">Gender</label>
            <select id="reg-gender" class="form-select">
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Age</label>
            <input type="number" id="reg-age" class="form-control" placeholder="28" value="28" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Residential Address</label>
          <textarea id="reg-address" class="form-control" rows="2" placeholder="City, State, Zip" required>Hyderabad, Telangana</textarea>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="reg-password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.8rem; margin-top: 1rem;">Complete Registration</button>
      </form>

      <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
        Already have an account? <a href="login.html" style="color: var(--primary-cyan); text-decoration: none; font-weight: 600;">Sign In</a>
      </div>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
