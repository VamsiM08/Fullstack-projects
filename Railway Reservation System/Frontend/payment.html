<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Gateway - RailExpress</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="brand-logo">
        <div class="brand-icon">🚆</div>
        <div class="brand-text">Rail<span>Express</span></div>
      </a>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="trains.html" class="nav-link">Search Trains</a></li>
        <li><a href="booking_history.html" class="nav-link">PNR / Bookings</a></li>
      </ul>
      <div id="nav-user-area"></div>
    </div>
  </nav>

  <!-- Main Wrapper -->
  <main class="main-wrapper" style="max-width: 550px;">
    
    <div class="glass-panel" style="padding: 2.5rem;">
      <div style="text-align: center; margin-bottom: 2rem;">
        <span class="badge badge-pending" style="margin-bottom: 0.5rem;">Payment Pending</span>
        <h1 style="font-size: 1.8rem; font-weight: 800;">Secure Payment Checkout</h1>
        <p style="color: var(--text-muted); font-size: 0.9rem;">Complete your transaction to finalize ticket booking</p>
      </div>

      <!-- Payment Summary -->
      <div style="background: rgba(0,0,0,0.25); padding: 1.25rem; border-radius: var(--radius-sm); margin-bottom: 2rem;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
          <span style="color: var(--text-muted);">Booking Reference:</span>
          <strong id="pay-booking-id">#401</strong>
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
          <span style="color: var(--text-muted);">Passenger:</span>
          <strong id="pay-passenger-name">Rahul Sharma</strong>
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
          <span style="color: var(--text-muted);">Train:</span>
          <strong id="pay-train-name">Vande Bharat Express</strong>
        </div>
        <div style="display: flex; justify-content: space-between; border-top: 1px dashed var(--border-color); padding-top: 0.75rem; margin-top: 0.75rem;">
          <span style="font-weight: 700; font-size: 1.1rem;">Amount Due:</span>
          <strong id="pay-amount" style="font-size: 1.4rem; color: var(--primary-cyan);">₹1200</strong>
        </div>
      </div>

      <form id="payment-form">
        <div class="form-group">
          <label class="form-label">Payment Method</label>
          <select id="payment-method" class="form-select">
            <option value="UPI">UPI (Google Pay / PhonePe / Paytm)</option>
            <option value="Credit Card">Credit Card</option>
            <option value="Debit Card">Debit Card</option>
            <option value="Net Banking">Net Banking</option>
            <option value="Wallet">Wallet (Amazon Pay / Paytm)</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">UPI ID / Card Details / Wallet ID</label>
          <input type="text" class="form-control" placeholder="rahul@upi or 4532 •••• •••• 9812" value="rahul@okicici" required>
        </div>

        <button type="submit" class="btn btn-emerald" style="width: 100%; padding: 0.9rem; font-size: 1.05rem; margin-top: 1.5rem;">Pay & Confirm Ticket</button>
      </form>

    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
