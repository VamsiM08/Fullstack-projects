<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseTracker - Manage Income</title>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar-container"></div>

    <main>
        <div style="margin-bottom: 2rem;">
            <h1 style="font-size: 2rem; font-weight: 800; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Income Management</h1>
            <p style="color: var(--text-secondary);">Log and organize your salary, dividends, and other incoming revenue streams.</p>
        </div>

        <div class="split-layout">
            <!-- Add Income Form -->
            <div class="glass-panel" style="padding: 1.5rem;">
                <h3 class="panel-title"><i class="fas fa-plus-circle"></i> Add New Income</h3>
                <div id="form-error" style="display: none; padding: 10px; border-radius: 8px; background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger-color); color: var(--danger-color); font-size: 0.9rem; margin-bottom: 1rem;"></div>
                
                <form id="add-income-form">
                    <div class="form-group">
                        <label for="inc-source">Source</label>
                        <input type="text" id="inc-source" required placeholder="e.g. Salary, Freelance, Dividend">
                    </div>
                    
                    <div class="form-group">
                        <label for="inc-amount">Amount (₹)</label>
                        <input type="number" id="inc-amount" required min="1" step="any" placeholder="e.g. 50000">
                    </div>

                    <div class="form-group">
                        <label for="inc-date">Received Date</label>
                        <input type="date" id="inc-date" required>
                    </div>

                    <div class="form-group">
                        <label for="inc-desc">Description</label>
                        <textarea id="inc-desc" rows="3" placeholder="Optional details..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        Log Income <i class="fas fa-coins"></i>
                    </button>
                </form>
            </div>

            <!-- History List -->
            <div class="glass-panel history-card">
                <h3 class="panel-title"><i class="fas fa-clock-rotate-left"></i> Income History</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Source</th>
                                <th>Amount</th>
                                <th>Received Date</th>
                                <th>Description</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="income-table-body">
                            <!-- Incomes lists dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Edit Income Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content glass-panel">
            <span class="close-modal" onclick="closeEditModal()">&times;</span>
            <h3 class="panel-title"><i class="fas fa-edit"></i> Edit Income</h3>
            <div id="modal-error" style="display: none; padding: 10px; border-radius: 8px; background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger-color); color: var(--danger-color); font-size: 0.9rem; margin-bottom: 1rem;"></div>
            
            <form id="edit-income-form">
                <input type="hidden" id="edit-inc-id">
                <div class="form-group">
                    <label for="edit-inc-source">Source</label>
                    <input type="text" id="edit-inc-source" required>
                </div>
                
                <div class="form-group">
                    <label for="edit-inc-amount">Amount (₹)</label>
                    <input type="number" id="edit-inc-amount" required min="1" step="any">
                </div>

                <div class="form-group">
                    <label for="edit-inc-date">Received Date</label>
                    <input type="date" id="edit-inc-date" required>
                </div>

                <div class="form-group">
                    <label for="edit-inc-desc">Description</label>
                    <textarea id="edit-inc-desc" rows="3"></textarea>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Update Record <i class="fas fa-check-circle"></i>
                </button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 ExpenseTracker. All rights reserved. Created for Python-FSD major project evaluation.</p>
    </footer>

    <!-- JS -->
    <script src="script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Default today's date in form
            document.getElementById("inc-date").value = new Date().toISOString().split("T")[0];
            loadIncomes();
        });

        async function loadIncomes() {
            const user = getCurrentUser();
            if (!user) return;
            
            try {
                const incomes = await apiCall(`/income/?user_name=${encodeURIComponent(user.full_name)}`);
                const tbody = document.getElementById("income-table-body");
                tbody.innerHTML = "";
                
                if (incomes.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-secondary);">No income records logged yet.</td></tr>`;
                    return;
                }
                
                incomes.forEach(inc => {
                    tbody.innerHTML += `
                        <tr id="row-inc-${inc.income_id}">
                            <td><strong>${inc.source}</strong></td>
                            <td style="color: var(--success-color); font-weight: 600;">+ ₹${inc.amount.toLocaleString()}</td>
                            <td>${inc.received_date}</td>
                            <td style="color: var(--text-secondary); max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${inc.description || '-'}</td>
                            <td>
                                <div class="action-btns">
                                    <button class="edit-btn" onclick="openEditModal(${inc.income_id}, '${escapeHtml(inc.source)}', ${inc.amount}, '${inc.received_date}', '${escapeHtml(inc.description || '')}')" title="Edit">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button class="delete-btn" onclick="deleteRecord(${inc.income_id})" title="Delete">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error("Failed to load income data:", err);
            }
        }

        // Form Submit Handler
        document.getElementById("add-income-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const user = getCurrentUser();
            if (!user) return;
            
            const source = document.getElementById("inc-source").value.trim();
            const amount = document.getElementById("inc-amount").value;
            const received_date = document.getElementById("inc-date").value;
            const description = document.getElementById("inc-desc").value.trim();
            
            const errorDiv = document.getElementById("form-error");
            errorDiv.style.display = "none";
            
            const payload = {
                income_id: Math.floor(Math.random() * 900000) + 100000, // 6-digit random ID
                user_name: user.full_name,
                source,
                amount: parseFloat(amount),
                received_date,
                description
            };
            
            try {
                await apiCall("/income/add/", "POST", payload);
                document.getElementById("inc-source").value = "";
                document.getElementById("inc-amount").value = "";
                document.getElementById("inc-desc").value = "";
                
                await loadIncomes();
                await recalculateBudgets();
            } catch (err) {
                errorDiv.textContent = err.message || "Failed to add income record.";
                errorDiv.style.display = "block";
            }
        });

        // Edit Modal handlers
        function openEditModal(id, source, amount, date, desc) {
            document.getElementById("edit-inc-id").value = id;
            document.getElementById("edit-inc-source").value = source;
            document.getElementById("edit-inc-amount").value = amount;
            document.getElementById("edit-inc-date").value = date;
            document.getElementById("edit-inc-desc").value = desc;
            
            document.getElementById("modal-error").style.display = "none";
            document.getElementById("edit-modal").style.display = "flex";
        }

        function closeEditModal() {
            document.getElementById("edit-modal").style.display = "none";
        }

        document.getElementById("edit-income-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const user = getCurrentUser();
            if (!user) return;
            
            const id = document.getElementById("edit-inc-id").value;
            const source = document.getElementById("edit-inc-source").value.trim();
            const amount = document.getElementById("edit-inc-amount").value;
            const received_date = document.getElementById("edit-inc-date").value;
            const description = document.getElementById("edit-inc-desc").value.trim();
            
            const errorDiv = document.getElementById("modal-error");
            errorDiv.style.display = "none";
            
            const payload = {
                user_name: user.full_name,
                source,
                amount: parseFloat(amount),
                received_date,
                description
            };
            
            try {
                await apiCall(`/income/update/${id}/`, "PUT", payload);
                closeEditModal();
                await loadIncomes();
                await recalculateBudgets();
            } catch (err) {
                errorDiv.textContent = err.message || "Failed to update income record.";
                errorDiv.style.display = "block";
            }
        });

        // Delete Handler
        async function deleteRecord(id) {
            if (confirm("Are you sure you want to delete this income record?")) {
                try {
                    await apiCall(`/income/delete/${id}/`, "DELETE");
                    await loadIncomes();
                    await recalculateBudgets();
                } catch (err) {
                    alert(err.message || "Failed to delete record.");
                }
            }
        }

        // HTML escaping helper
        function escapeHtml(str) {
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
