<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | AURA Academy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-gradient-glow glow-1"></div>
    <div class="bg-gradient-glow glow-2"></div>

    <header></header>

    <main>
        <div class="glass-card form-container">
            <div class="form-header">
                <h2>Welcome Back</h2>
                <p>Sign in to resume your learning progress</p>
            </div>

            <!-- Role Selection Options -->
            <div class="role-selector">
                <div class="role-option active" id="role-student">Student Access</div>
                <div class="role-option" id="role-admin">Admin Portal</div>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="login-email">Email Address</label>
                    <input type="email" class="form-input" id="login-email" placeholder="e.g. rahul@gmail.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="login-password">Password</label>
                    <input type="password" class="form-input" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="nav-btn btn-full">Sign In to Dashboard</button>
            </form>

            <div class="form-footer">
                Don't have an account? <a href="register.html">Register as Student</a>
            </div>
            
            <div style="margin-top: 1.5rem; text-align: center; font-size: 0.8rem; color: var(--text-muted);">
                <strong>Sample Logins:</strong><br>
                Student: rahul@gmail.com / rahul123<br>
                Admin: admin@lms.com / admin123
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 Aura Learning Academy (LMS). Built with Django & Vanilla Web Tech.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
