<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses Catalogue | AURA Academy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-gradient-glow glow-1"></div>
    <div class="bg-gradient-glow glow-2"></div>

    <header></header>

    <main>
        <div style="margin-bottom: 2rem;">
            <h2 class="section-title">Academy Bootcamps</h2>
            <p style="color: var(--text-secondary); margin-top: 0.5rem;">Explore courses curated by field experts and accelerate your technical career path.</p>
        </div>

        <!-- Course Search & Filter Panel (Bonus Feature) -->
        <div class="glass-card filter-bar">
            <div class="search-input-wrapper">
                <span class="search-icon-inside">🔍</span>
                <input type="text" id="course-search" placeholder="Search by course name or instructor...">
            </div>
            
            <select id="course-category" class="select-filter">
                <option value="all">All Categories</option>
                <!-- Categories dynamically loaded by script.js -->
            </select>

            <select id="course-level" class="select-filter">
                <option value="all">All Levels</option>
                <option value="Beginner">Beginner</option>
                <option value="Intermediate">Intermediate</option>
                <option value="Advanced">Advanced</option>
            </select>
        </div>

        <!-- Course Listings Grid -->
        <div id="courses-list-grid" class="course-grid">
            <!-- Loaded dynamically via script.js -->
            <div class="glass-card course-card" style="grid-column: 1/-1; text-align: center; padding: 3rem;">
                <div style="color: var(--text-secondary);">Loading available bootcamps...</div>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 Aura Learning Academy (LMS). Built with Django & Vanilla Web Tech.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
