<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Antigravity Bus</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="navbar" id="navbar-container"></header>

    <main style="display: flex; align-items: center; justify-content: center;">
        <div class="auth-wrapper glass-panel" style="max-width: 500px;">
            <div class="auth-title">
                <h2>Passenger Registration</h2>
                <p>Create an account to book tickets and manage trips</p>
            </div>
            
            <form id="register-form">
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label for="reg_name">Full Name</label>
                    <div class="input-container">
                        <i class="fas fa-user"></i>
                        <input type="text" id="reg_name" placeholder="e.g. Rahul Sharma" class="form-input" required>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 1rem;">
                    <label for="reg_email">Email Address</label>
                    <div class="input-container">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="reg_email" placeholder="e.g. rahul@gmail.com" class="form-input" required>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 1rem;">
                    <label for="reg_phone">Phone Number</label>
                    <div class="input-container">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="reg_phone" placeholder="e.g. 9876543210" class="form-input" required>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 1rem;">
                    <label for="reg_gender">Gender</label>
                    <div class="input-container">
                        <i class="fas fa-venus-mars"></i>
                        <select id="reg_gender" class="form-input" required>
                            <option value="" disabled selected>Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 1rem;">
                    <label for="reg_address">Address / City</label>
                    <div class="input-container">
                        <i class="fas fa-map-marked-alt"></i>
                        <input type="text" id="reg_address" placeholder="e.g. Hyderabad" class="form-input" required>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 1.25rem;">
                    <label for="reg_password">Password</label>
                    <div class="input-container">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="reg_password" placeholder="••••••••" class="form-input" required>
                    </div>
                </div>
                
                <button type="submit" class="btn-auth">Register Account <i class="fas fa-user-plus"></i></button>
            </form>
            
            <div class="auth-links">
                Already registered? <a href="login.html">Login here</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Antigravity Bus Booking App. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', initAuthPages);
    </script>
</body>
</html>
