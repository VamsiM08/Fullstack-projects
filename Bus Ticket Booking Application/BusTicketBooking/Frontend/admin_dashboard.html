<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Antigravity Bus</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="navbar" id="navbar-container"></header>

    <main>
        <!-- Admin Title and Tab Selection Header -->
        <div class="admin-header">
            <div>
                <h1 style="font-size: 2.2rem; font-weight: 800; color: var(--text-primary);">
                    Admin <span style="background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Operator Control Panel</span>
                </h1>
                <p style="color: var(--text-muted); font-size: 0.95rem; margin-top: 0.25rem;">Real-time management of passengers, buses, schedules, ticket bookings, and payment transactions.</p>
            </div>
            
            <div class="admin-tabs">
                <button class="admin-tab active" data-tab="passengers">Passengers</button>
                <button class="admin-tab" data-tab="buses">Buses</button>
                <button class="admin-tab" data-tab="routes">Routes &amp; Schedules</button>
                <button class="admin-tab" data-tab="bookings">Bookings</button>
                <button class="admin-tab" data-tab="payments">Payments</button>
            </div>
        </div>

        <!-- Management Data Container -->
        <section class="glass-panel" style="padding: 2rem;">
            <div class="admin-action-bar">
                <h3 class="glass-panel-title" style="margin-bottom:0">
                    <i class="fas fa-database"></i> Entity Registry
                </h3>
                <button onclick="openAdminAddModal()" class="btn-add">
                    <i class="fas fa-plus"></i> <span id="add-btn-text">Add Passenger</span>
                </button>
            </div>

            <div class="table-responsive" style="margin-top: 1.5rem;">
                <table>
                    <thead>
                        <tr id="admin-table-header">
                            <!-- Populated dynamically -->
                            <th>ID</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body">
                        <!-- Populated dynamically -->
                        <tr><td style="text-align:center"><div class="spinner"></div></td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Create/Edit Form Modal -->
    <div class="modal-overlay" id="admin-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="admin-modal-title">Create Entity</h3>
                <button class="modal-close" onclick="closeAdminModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="admin-modal-body">
                <!-- Form fields will render here -->
            </div>
            <div class="modal-footer">
                <button onclick="closeAdminModal()" class="btn-secondary">Cancel</button>
                <button onclick="submitAdminForm()" class="btn-add" style="border-radius: var(--radius-sm);">Save Record <i class="fas fa-check"></i></button>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Antigravity Bus Booking App. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', initAdminDashboard);
    </script>
</body>
</html>
