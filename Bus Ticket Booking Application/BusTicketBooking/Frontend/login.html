<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Antigravity Bus</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="navbar" id="navbar-container"></header>

    <main style="display: flex; align-items: center; justify-content: center;">
        <div class="auth-wrapper glass-panel">
            <div class="auth-title">
                <h2>Welcome Back</h2>
                <p>Sign in to access your bookings and dashboard</p>
            </div>
            
            <form id="login-form">
                <div class="form-group" style="margin-bottom: 1.25rem;">
                    <label for="login_email">Email Address</label>
                    <div class="input-container">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="login_email" placeholder="e.g. rahul@gmail.com" class="form-input" required>
                    </div>
                </div>
                
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="login_password">Password</label>
                    <div class="input-container">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="login_password" placeholder="••••••••" class="form-input" required>
                    </div>
                </div>
                
                <button type="submit" class="btn-auth">Login <i class="fas fa-sign-in-alt"></i></button>
            </form>
            
            <div class="auth-links">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
            
            <div style="margin-top: 1.5rem; text-align: center; border-top: 1px solid var(--border-color); padding-top: 1rem; font-size: 0.8rem; color: var(--text-muted);">
                <p>Testing Admin? Use <strong>admin@bus.com</strong> &amp; <strong>admin123</strong></p>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Antigravity Bus Booking App. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', initAuthPages);
    </script>
</body>
</html>
