<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GigNexus</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="ambient-bg">
        <div class="ambient-glow-1"></div>
        <div class="ambient-glow-2"></div>
    </div>

    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">
                GigNexus <span class="logo-dot"></span>
            </a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="projects.html">Browse Projects</a></li>
                </ul>
            </nav>
            <div class="nav-auth">
                <a href="register.html" class="btn btn-primary btn-sm">Register Instead</a>
            </div>
        </div>
    </header>

    <main style="display: flex; justify-content: center; align-items: center; min-height: 70vh; padding: 1rem;">
        <div class="card" style="width: 100%; max-width: 450px; padding: 2.5rem;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <i class="fa-solid fa-right-to-bracket" style="font-size: 2.5rem; color: var(--color-primary); margin-bottom: 1rem;"></i>
                <h2 style="margin-bottom: 0.5rem;">Welcome Back</h2>
                <p class="text-muted" style="font-size: 0.9rem;">Sign in to access your gigs, bids, and contracts.</p>
            </div>

            <!-- Role Selector Tabs -->
            <div class="tab-container" style="margin-bottom: 1.5rem;">
                <div class="tab-nav" style="margin-bottom: 0.5rem; justify-content: center;">
                    <button class="tab-btn active" id="btn-role-freelancer" onclick="GigNexus.setLoginRole('freelancer')">
                        <i class="fa-solid fa-laptop-code"></i> Freelancer
                    </button>
                    <button class="tab-btn" id="btn-role-client" onclick="GigNexus.setLoginRole('client')">
                        <i class="fa-solid fa-building"></i> Client
                    </button>
                </div>
            </div>

            <!-- Login Form -->
            <form id="login-form" onsubmit="GigNexus.handleLogin(event)">
                <div class="form-group">
                    <label for="login-email">Registered Email Address</label>
                    <div style="position: relative;">
                        <span style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted);">
                            <i class="fa-solid fa-envelope"></i>
                        </span>
                        <input type="email" id="login-email" class="form-control" placeholder="e.g. rahul@gmail.com" required style="padding-left: 2.5rem;">
                    </div>
                    <small id="login-hint" class="text-muted" style="display: block; margin-top: 0.5rem; font-size: 0.8rem;">
                        Hint: Use <strong>rahul@gmail.com</strong> for Freelancer or <strong>client@techsolutions.com</strong> for Client.
                    </small>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;">
                    Sign In <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted);">
                Don't have an account? <a href="register.html" style="color: var(--color-primary); text-decoration: none; font-weight: 600;">Create one</a>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 GigNexus Inc. All rights reserved.</p>
    </footer>

    <div class="toast-container" id="toast-container"></div>

    <script src="script.js"></script>
    <script>
        // Set initial role state
        window.currentLoginRole = 'freelancer';
    </script>
</body>
</html>
