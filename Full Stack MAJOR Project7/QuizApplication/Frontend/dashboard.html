<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | Q-Master Quiz Systems</title>
    <meta name="description" content="Access available tests, view score percentage, review pass/fail status, and monitor your overall progress.">
    <link rel="stylesheet" href="style.css">
</head>
<body id="dashboard-page">

    <header>
        <nav class="navbar">
            <a href="index.html" class="logo" id="logo-link">
                <span>⚡</span> Q-Master
            </a>
            <ul class="nav-links" id="nav-right">
                <!-- Will be dynamically updated by script.js -->
            </ul>
        </nav>
    </header>

    <main class="container">
        <!-- 1. Available Quizzes Section -->
        <section class="dashboard-section mb-3">
            <h2 style="font-size: 2rem; font-weight: 700; margin-bottom: 1.5rem;">Available Quizzes</h2>
            <div class="quizzes-grid" id="dashboard-quizzes-grid">
                <!-- Quizzes will populate here -->
                <div class="glass-card" style="text-align: center; grid-column: 1/-1;">
                    <p style="color: var(--text-secondary);">Loading available quizzes...</p>
                </div>
            </div>
        </section>

        <!-- 2. Personal Score History Section -->
        <section class="history-section">
            <h2>Your Score History</h2>
            <div class="glass-card" style="padding: 1.5rem;">
                <div class="data-table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Quiz Title</th>
                                <th>Total Marks</th>
                                <th>Obtained Marks</th>
                                <th>Percentage</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="history-table-body">
                            <!-- Populated by JS -->
                            <tr>
                                <td colspan="6" style="text-align: center; color: var(--text-secondary);">Fetching history...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Q-Master Quiz Systems. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
