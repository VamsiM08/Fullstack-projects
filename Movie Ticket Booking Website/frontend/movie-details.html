<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Details - CinePass</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Shared Navigation Header -->
    <header></header>

    <main class="container">
        
        <!-- Movie Details Section -->
        <section class="movie-detail-container fade-in" id="movie-details-content">
            <!-- Left Poster -->
            <div class="movie-detail-poster">
                <div style="background: var(--glass-bg); aspect-ratio: 2/3; border-radius: var(--border-radius-md); display: flex; align-items: center; justify-content: center; border: 1px solid var(--glass-border);">
                    <i class="fas fa-spinner fa-spin fa-3x" style="color: var(--text-muted);"></i>
                </div>
            </div>
            
            <!-- Right Meta Info -->
            <div class="movie-detail-info">
                <div style="height: 20px; background: var(--glass-bg); width: 30%; border-radius: 4px; margin-bottom: 1rem;"></div>
                <div style="height: 45px; background: var(--glass-bg); width: 70%; border-radius: 8px; margin-bottom: 1.5rem;"></div>
                <div style="height: 100px; background: var(--glass-bg); width: 100%; border-radius: 8px;"></div>
            </div>
        </section>

        <!-- Trailer Preview -->
        <section class="fade-in" style="margin-bottom: 4rem;">
            <div class="section-header">
                <h2>Watch Trailer</h2>
            </div>
            <div class="trailer-section" id="trailer-container">
                <div style="background: var(--bg-secondary); height: 360px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--glass-border);">
                    <p style="color: var(--text-muted);"><i class="fab fa-youtube fa-3x" style="margin-bottom: 1rem; display: block; text-align: center; color: var(--danger);"></i>No trailer link available</p>
                </div>
            </div>
        </section>

        <!-- Showtimes Schedule -->
        <section class="glass-panel showtimes-box fade-in">
            <h2 style="font-family: var(--font-heading); font-size: 1.6rem; font-weight: 700; margin-bottom: 1.5rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.75rem;">
                <i class="fas fa-calendar-alt" style="margin-right: 0.5rem; color: var(--accent-blue);"></i>Available Showtimes
            </h2>
            
            <div id="showtimes-container">
                <div style="text-align: center; padding: 2rem; color: var(--text-secondary);">
                    <i class="fas fa-spinner fa-spin fa-2x" style="margin-bottom: 1rem;"></i>
                    <p>Loading show schedules...</p>
                </div>
            </div>
        </section>

    </main>

    <script src="js/app.js"></script>
    <script>
        const movieId = getQueryParam("id");

        // Helper to convert watch link to embed link
        function getEmbedUrl(youtubeUrl) {
            if (!youtubeUrl) return "";
            try {
                let videoId = "";
                if (youtubeUrl.includes("youtube.com/watch")) {
                    const urlParams = new URLSearchParams(new URL(youtubeUrl).search);
                    videoId = urlParams.get("v");
                } else if (youtubeUrl.includes("youtu.be/")) {
                    videoId = youtubeUrl.split("youtu.be/")[1].split("?")[0];
                } else if (youtubeUrl.includes("youtube.com/embed/")) {
                    return youtubeUrl;
                }
                return videoId ? `https://www.youtube.com/embed/${videoId}` : youtubeUrl;
            } catch(e) {
                return youtubeUrl;
            }
        }

        async function loadMovieDetails() {
            if (!movieId) {
                showToast("Invalid movie selected", "danger");
                setTimeout(() => window.location.href = "index.html", 1500);
                return;
            }

            try {
                // Fetch details
                const movie = await apiRequest(`movies/${movieId}`);
                if (!movie) return;

                // Render Metadata
                const detailsContainer = document.getElementById("movie-details-content");
                detailsContainer.innerHTML = `
                    <div class="movie-detail-poster">
                        <img src="${movie.poster || 'https://images.unsplash.com/photo-1594909122845-11baa439b7bf?w=500'}" alt="${movie.title}">
                    </div>
                    <div class="movie-detail-info">
                        <span class="category-chip active" style="font-size: 0.8rem; margin-bottom: 1rem; display: inline-block;">${movie.genre}</span>
                        <h1>${movie.title}</h1>
                        <div class="movie-detail-meta">
                            <span><i class="fas fa-star" style="color: var(--warning);"></i> <b>${movie.rating}</b> / 10</span>
                            <span><i class="fas fa-clock"></i> ${movie.duration}</span>
                            <span><i class="fas fa-language"></i> ${movie.language}</span>
                            <span><i class="fas fa-calendar-day"></i> Rel: ${movie.releaseDate || 'N/A'}</span>
                        </div>
                        <p class="movie-detail-desc">${movie.description || 'No description available.'}</p>
                        
                        <div style="margin-top: 1.5rem; border-top: 1px solid var(--glass-border); padding-top: 1.5rem;">
                            <h4 style="font-family: var(--font-heading); color: var(--text-primary); margin-bottom: 0.5rem;">Cast & Crew</h4>
                            <p style="color: var(--text-secondary); font-size: 0.9rem;">Featured: Primary Ensemble Directors and Screenwriters</p>
                        </div>
                    </div>
                `;

                // Update tab title
                document.title = `${movie.title} - CinePass`;

                // Render Trailer
                const trailerContainer = document.getElementById("trailer-container");
                const embedUrl = getEmbedUrl(movie.trailer);
                if (embedUrl) {
                    trailerContainer.innerHTML = `
                        <iframe src="${embedUrl}" allowfullscreen></iframe>
                    `;
                } else {
                    trailerContainer.innerHTML = `
                        <div style="background: var(--bg-secondary); height: 260px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--glass-border);">
                            <p style="color: var(--text-muted);"><i class="fab fa-youtube fa-3x" style="margin-bottom: 1rem; display: block; text-align: center; color: var(--danger);"></i>Trailer is not available for this movie.</p>
                        </div>
                    `;
                }

                // Load Showtimes
                await loadShowtimes();

            } catch (err) {
                console.error(err);
            }
        }

        async function loadShowtimes() {
            try {
                const shows = await apiRequest(`shows/movie/${movieId}`);
                const container = document.getElementById("showtimes-container");
                
                if (!shows || shows.length === 0) {
                    container.innerHTML = `
                        <div style="text-align: center; padding: 3rem; color: var(--text-secondary);">
                            <i class="fas fa-exclamation-circle fa-2x" style="margin-bottom: 1rem; color: var(--warning);"></i>
                            <p style="font-size: 1.1rem; font-weight: 500;">No shows scheduled currently.</p>
                            <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 0.25rem;">Please check back later or check other movies.</p>
                        </div>
                    `;
                    return;
                }

                // Group shows by theatreId
                const grouped = {};
                shows.forEach(show => {
                    const t = show.theatre;
                    if (!t) return;
                    if (!grouped[t._id]) {
                        grouped[t._id] = {
                            theatreName: t.theatreName,
                            address: t.address,
                            city: t.city,
                            shows: []
                        };
                    }
                    grouped[t._id].shows.push(show);
                });

                let html = "";
                for (const tId in grouped) {
                    const group = grouped[tId];
                    html += `
                        <div class="theatre-row">
                            <div class="theatre-header-info">
                                <div>
                                    <div class="theatre-name">${group.theatreName}</div>
                                    <div class="theatre-address">${group.address}, ${group.city}</div>
                                </div>
                            </div>
                            <div class="showtimes-list">
                                ${group.shows.map(s => `
                                    <a href="booking.html?showId=${s._id}" class="showtime-btn">
                                        <div>${s.showTime}</div>
                                        <div style="font-size: 0.75rem; font-weight: normal; color: var(--text-secondary); margin-top: 0.2rem;">
                                            ${s.screen ? s.screen.screenName : 'Screen 1'} • Rs. ${s.ticketPrice}
                                        </div>
                                    </a>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;

            } catch(e) {
                console.error(e);
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadMovieDetails();
        });
    </script>
</body>
</html>
