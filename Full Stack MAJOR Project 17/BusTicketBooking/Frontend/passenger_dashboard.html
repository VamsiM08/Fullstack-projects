<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passenger Dashboard - Antigravity Bus</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="navbar" id="navbar-container"></header>

    <main>
        <!-- Welcome banner -->
        <section class="hero" style="padding: 2.5rem 1.5rem; text-align: left; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 2rem; margin-bottom: 2rem;">
            <div>
                <h1 style="font-size: 2.5rem; margin-bottom: 0.25rem;">Welcome, <span id="dash-profile-name">Passenger</span>!</h1>
                <p style="margin: 0; color: var(--text-muted);" id="dash-profile-email">passenger@gmail.com</p>
            </div>
            <div>
                <a href="buses.html" class="nav-btn nav-btn-primary" style="padding: 0.8rem 1.75rem;"><i class="fas fa-ticket-alt"></i> Book New Ticket</a>
            </div>
        </section>

        <!-- Stats Cards Row -->
        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-details">
                    <h3 id="stat-total-bookings">0</h3>
                    <p>Total Bookings</p>
                </div>
                <div class="stat-icon"><i class="fas fa-receipt"></i></div>
            </div>
            <div class="stat-card">
                <div class="stat-details">
                    <h3 id="stat-upcoming">0</h3>
                    <p>Upcoming Trips</p>
                </div>
                <div class="stat-icon"><i class="fas fa-plane-departure"></i></div>
            </div>
            <div class="stat-card">
                <div class="stat-details">
                    <h3 id="stat-completed">0</h3>
                    <p>Completed Trips</p>
                </div>
                <div class="stat-icon"><i class="fas fa-check-double"></i></div>
            </div>
            <div class="stat-card">
                <div class="stat-details">
                    <h3 id="stat-cancelled">0</h3>
                    <p>Cancelled Tickets</p>
                </div>
                <div class="stat-icon"><i class="fas fa-times-circle"></i></div>
            </div>
        </section>

        <!-- Main Dashboard Split Layout -->
        <div class="booking-grid" style="grid-template-columns: 1fr 450px;">
            <!-- Recent Bookings Table -->
            <section class="glass-panel" style="padding: 2rem;">
                <h3 class="glass-panel-title"><i class="fas fa-clipboard-list"></i> Recent Bookings</h3>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Booking ID</th>
                                <th>Bus Name</th>
                                <th>Route</th>
                                <th>Date</th>
                                <th>Seat</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="dashboard-recent-bookings">
                            <tr><td colspan="6" style="text-align:center"><div class="spinner"></div></td></tr>
                        </tbody>
                    </table>
                </div>
                <div style="text-align: right; margin-top: 1rem;">
                    <a href="history.html" style="font-size: 0.9rem; color: var(--primary); font-weight: 600;">View full history <i class="fas fa-chevron-right"></i></a>
                </div>
            </section>

            <!-- Profile Settings Card -->
            <section class="glass-panel" style="padding: 2rem;">
                <h3 class="glass-panel-title"><i class="fas fa-user-cog"></i> Profile Settings</h3>
                <form id="profile-form">
                    <div class="form-group" style="margin-bottom: 1rem;">
                        <label for="prof_name">Full Name</label>
                        <input type="text" id="prof_name" class="form-input" style="padding-left:1rem" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 1rem;">
                        <label for="prof_email">Email (Immutable)</label>
                        <input type="email" id="prof_email" class="form-input" style="padding-left:1rem" disabled>
                    </div>
                    <div class="form-group" style="margin-bottom: 1rem;">
                        <label for="prof_phone">Phone Number</label>
                        <input type="text" id="prof_phone" class="form-input" style="padding-left:1rem" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 1rem;">
                        <label for="prof_gender">Gender</label>
                        <select id="prof_gender" class="form-input" style="padding-left:1rem">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 1rem;">
                        <label for="prof_address">Address</label>
                        <input type="text" id="prof_address" class="form-input" style="padding-left:1rem" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 1.5rem;">
                        <label for="prof_password">Password</label>
                        <input type="password" id="prof_password" class="form-input" style="padding-left:1rem" required>
                    </div>
                    
                    <button type="submit" class="btn-checkout" style="padding: 0.75rem;">Save Changes <i class="fas fa-save"></i></button>
                </form>
            </section>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Antigravity Bus Booking App. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', initPassengerDashboard);
    </script>
</body>
</html>
