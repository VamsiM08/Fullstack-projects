<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GourmetGO | Customer Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Section -->
    <header id="global-header"></header>

    <!-- Auth Wrapper -->
    <section class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">Create Profile</h1>
                <p class="auth-subtitle">Join us to start ordering delicious dishes.</p>
            </div>
            
            <form id="register-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label class="form-label" for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" class="form-control" required placeholder="e.g. Rahul Sharma">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" class="form-control" required placeholder="e.g. rahul@gmail.com">
                </div>

                <div class="form-group">
                    <label class="form-label" for="reg-phone">Phone Number</label>
                    <input type="tel" id="reg-phone" class="form-control" required placeholder="e.g. 9876543210">
                </div>

                <div class="form-group">
                    <label class="form-label" for="reg-address">Delivery Address</label>
                    <input type="text" id="reg-address" class="form-control" required placeholder="e.g. KPHB Colony">
                </div>

                <div class="form-group">
                    <label class="form-label" for="reg-city">City</label>
                    <input type="text" id="reg-city" class="form-control" required placeholder="e.g. Hyderabad">
                </div>
                
                <button type="submit" class="form-btn">Register Profile 🍔</button>
            </form>
            
            <div class="auth-footer">
                <p>Already registered? <a href="login.html">Login here</a></p>
            </div>
        </div>
    </section>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2026 GourmetGO Food Delivery Application. Designed for Python-FSD major evaluation.</p>
    </footer>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script>
        // Redirect if already logged in
        if (getLoggedInUser()) {
            window.location.href = "index.html";
        }

        async function handleRegister(event) {
            event.preventDefault();
            const full_name = document.getElementById("reg-name").value.trim();
            const email = document.getElementById("reg-email").value.trim();
            const phone = document.getElementById("reg-phone").value.trim();
            const address = document.getElementById("reg-address").value.trim();
            const city = document.getElementById("reg-city").value.trim();

            try {
                // Post to customers/add/
                const newCustomer = await fetchAPI("/customers/add/", {
                    method: "POST",
                    body: { full_name, email, phone, address, city }
                });
                
                showToast("Registration successful! Logging in...", "success");
                loginUser(newCustomer);
            } catch (err) {
                showToast(err.message || "Registration failed.", "error");
            }
        }
    </script>
</body>
</html>
