<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EventHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="navbarContainer"></div>

    <main class="main-container" style="display: flex; align-items: center; justify-content: center; min-height: 80vh;">
        <div class="card-box" style="width: 100%; max-width: 440px; padding: 2.5rem;">
            <h2 style="font-family: var(--font-heading); font-size: 2rem; margin-bottom: 0.5rem; text-align: center;">Welcome Back</h2>
            <p style="color: var(--text-secondary); text-align: center; margin-bottom: 2rem; font-size: 0.95rem;">Enter your credentials to access your EventHub account.</p>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="e.g. rahul@gmail.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">Log In</button>
            </form>

            <div style="background: rgba(99, 102, 241, 0.1); border: 1px solid var(--border-glow); padding: 0.8rem; border-radius: var(--radius-md); margin-top: 1.5rem; font-size: 0.82rem; color: var(--text-secondary);">
                💡 <strong>Demo Credentials:</strong><br>
                User: rahul@gmail.com / rahul123<br>
                Organizer: priya@gmail.com / priya123<br>
                Admin: admin@eventhub.com / admin123
            </div>

            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.9rem;">
                Don't have an account? <a href="register.html" style="color: var(--accent-indigo); font-weight: 600;">Register Now</a>
            </p>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const payload = {
                email: document.getElementById('loginEmail').value.trim(),
                password: document.getElementById('loginPassword').value
            };

            try {
                const res = await apiCall('/users/login/', 'POST', payload);
                Storage.setUser(res.user);
                showToast(`Welcome back, ${res.user.full_name}!`, 'success');
                setTimeout(() => {
                    if (res.user.role === 'organizer') window.location.href = 'organizer_dashboard.html';
                    else if (res.user.role === 'admin') window.location.href = 'admin_dashboard.html';
                    else window.location.href = 'user_dashboard.html';
                }, 800);
            } catch (err) {
                showToast(err.message || 'Invalid login credentials', 'error');
            }
        }
    </script>
</body>
</html>
