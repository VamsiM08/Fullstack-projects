<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Events - EventHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="navbarContainer"></div>

    <main class="main-container">
        <div style="margin-bottom: 2rem; text-align: center;">
            <h1 style="font-family: var(--font-heading); font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem;">Explore All Events</h1>
            <p style="color: var(--text-secondary);">Filter by category, search keywords, or sort to find your favorite experiences.</p>
        </div>

        <!-- Controls Bar -->
        <div class="card-box" style="padding: 1.25rem; margin-bottom: 2rem;">
            <div style="display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; justify-content: space-between;">
                <!-- Search Input -->
                <div style="flex: 1; min-width: 260px;">
                    <input type="text" id="eventsSearch" class="form-control" placeholder="Search event title, venue, or organizer..." oninput="applyFilters()">
                </div>
                <!-- Category Select -->
                <div style="width: 200px;">
                    <select id="categoryFilter" class="form-control" onchange="applyFilters()">
                        <option value="All">All Categories</option>
                        <option value="Conference">Conference</option>
                        <option value="Music Concert">Music Concert</option>
                        <option value="Comedy Show">Comedy Show</option>
                        <option value="Workshop">Workshop</option>
                        <option value="Sports">Sports</option>
                        <option value="Seminar">Seminar</option>
                    </select>
                </div>
                <!-- Sort Select -->
                <div style="width: 200px;">
                    <select id="sortFilter" class="form-control" onchange="applyFilters()">
                        <option value="default">Sort By: Default</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                        <option value="date">Upcoming Date</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Events List Grid -->
        <div class="events-grid" id="eventsPageGrid">
            <!-- Rendered dynamically -->
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 EventHub Ticket Booking Platform.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        let allEvents = [];

        async function fetchAllEvents() {
            try {
                allEvents = await apiCall('/events/');
                applyFilters();
            } catch (err) {
                showToast('Failed to fetch events', 'error');
            }
        }

        function applyFilters() {
            const query = document.getElementById('eventsSearch').value.toLowerCase().trim();
            const category = document.getElementById('categoryFilter').value;
            const sort = document.getElementById('sortFilter').value;

            let filtered = allEvents.filter(ev => {
                const matchesSearch = ev.event_name.toLowerCase().includes(query) || 
                                      ev.venue.toLowerCase().includes(query) ||
                                      ev.organizer_name.toLowerCase().includes(query);
                const matchesCat = category === 'All' || ev.category === category;
                return matchesSearch && matchesCat;
            });

            if (sort === 'price-low') {
                filtered.sort((a, b) => a.ticket_price - b.ticket_price);
            } else if (sort === 'price-high') {
                filtered.sort((a, b) => b.ticket_price - a.ticket_price);
            } else if (sort === 'date') {
                filtered.sort((a, b) => new Date(a.event_date) - new Date(b.event_date));
            }

            renderEventsGrid(filtered);
        }

        function renderEventsGrid(events) {
            const grid = document.getElementById('eventsPageGrid');
            if (!events || events.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 4rem 2rem; color: var(--text-muted);"><h3>No events match your criteria</h3><p>Try resetting filters or searching for something else.</p></div>';
                return;
            }

            grid.innerHTML = events.map(ev => `
                <div class="event-card">
                    <div class="event-card-img-wrapper">
                        <img src="${ev.image_url || 'https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=800&auto=format&fit=crop&q=80'}" alt="${ev.event_name}" class="event-card-img">
                        <span class="badge-category">${ev.category}</span>
                        <span class="badge-price">₹${ev.ticket_price}</span>
                    </div>
                    <div class="event-card-body">
                        <h3 class="event-card-title">${ev.event_name}</h3>
                        <div class="event-info-item">
                            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                            <span>${ev.event_date} at ${ev.event_time}</span>
                        </div>
                        <div class="event-info-item">
                            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/></svg>
                            <span>${ev.venue}</span>
                        </div>
                        <div class="event-card-footer">
                            <span style="font-size: 0.85rem; color: var(--accent-emerald);">🎟️ ${ev.available_tickets} available</span>
                            <a href="event_details.html?id=${ev.event_id}" class="btn-primary" style="padding: 0.45rem 1rem; font-size: 0.85rem;">Book Now</a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', fetchAllEvents);
    </script>
</body>
</html>
