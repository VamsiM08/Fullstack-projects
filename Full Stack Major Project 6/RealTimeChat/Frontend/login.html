<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - SyncLine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="glass-card">
            <h1 class="title-main">Welcome Back</h1>
            <p class="subtitle">Enter your details to access your chats</p>
            
            <div id="alert-box" class="alert-message"></div>
            
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" class="input-control" placeholder="e.g. rahul" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="input-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>
            
            <a href="register.html" class="link-action">Don't have an account? Sign up</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
