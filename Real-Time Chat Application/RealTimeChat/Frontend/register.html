<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - SyncLine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="glass-card">
            <h1 class="title-main">Create Account</h1>
            <p class="subtitle">Join SyncLine and start connecting</p>
            
            <div id="alert-box" class="alert-message"></div>
            
            <form id="register-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label class="form-label" for="full-name">Full Name</label>
                    <input type="text" id="full-name" class="input-control" placeholder="e.g. Rahul Sharma" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" class="input-control" placeholder="e.g. rahul" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="input-control" placeholder="e.g. rahul@gmail.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="input-control" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Select Profile Image</label>
                    <div class="avatar-grid">
                        <div class="avatar-option selected" data-avatar="profile.png" onclick="selectAvatar(this)">
                            <!-- SVG Avatar 1 -->
                            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="50" cy="50" r="50" fill="#673ab7"/>
                                <circle cx="50" cy="40" r="20" fill="#ede7f6"/>
                                <path d="M50 65c-20 0-35 10-35 20v5h70v-5c0-10-15-20-35-20z" fill="#ede7f6"/>
                            </svg>
                        </div>
                        <div class="avatar-option" data-avatar="avatar2.png" onclick="selectAvatar(this)">
                            <!-- SVG Avatar 2 -->
                            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="50" cy="50" r="50" fill="#00bcd4"/>
                                <circle cx="50" cy="40" r="20" fill="#e0f7fa"/>
                                <path d="M50 65c-20 0-35 10-35 20v5h70v-5c0-10-15-20-35-20z" fill="#e0f7fa"/>
                            </svg>
                        </div>
                        <div class="avatar-option" data-avatar="avatar3.png" onclick="selectAvatar(this)">
                            <!-- SVG Avatar 3 -->
                            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="50" cy="50" r="50" fill="#e91e63"/>
                                <circle cx="50" cy="40" r="20" fill="#fce4ec"/>
                                <path d="M50 65c-20 0-35 10-35 20v5h70v-5c0-10-15-20-35-20z" fill="#fce4ec"/>
                            </svg>
                        </div>
                        <div class="avatar-option" data-avatar="avatar4.png" onclick="selectAvatar(this)">
                            <!-- SVG Avatar 4 -->
                            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="50" cy="50" r="50" fill="#4caf50"/>
                                <circle cx="50" cy="40" r="20" fill="#e8f5e9"/>
                                <path d="M50 65c-20 0-35 10-35 20v5h70v-5c0-10-15-20-35-20z" fill="#e8f5e9"/>
                            </svg>
                        </div>
                    </div>
                    <input type="hidden" id="profile-image" value="profile.png">
                </div>
                
                <button type="submit" class="btn btn-primary">Sign Up</button>
            </form>
            
            <a href="login.html" class="link-action">Already have an account? Sign in</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
