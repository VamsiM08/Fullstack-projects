<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Book Management System</title>
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background blur glow elements for modern design aesthetic -->
    <div class="glow-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Notification Toast -->
    <div id="toast-container" class="toast-container"></div>

    <div class="app-wrapper">
        <header class="app-header">
            <div class="logo-area">
                <svg class="header-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
                <h1>Library Book Management</h1>
            </div>
            <p class="subtitle">Digital Catalog and Book Record System</p>
        </header>

        <main class="main-content">
            <!-- Left Side: Book Form (Glassmorphic Card) -->
            <section class="form-container">
                <div class="glass-card">
                    <div class="card-header">
                        <h2 id="form-title">Add a New Book</h2>
                        <p id="form-subtitle">Enter details to catalog a book in the library system</p>
                    </div>
                    
                    <form id="book-form" novalidate>
                        <!-- Book ID -->
                        <div class="input-group">
                            <label for="book-id">Book ID</label>
                            <div class="input-wrapper">
                                <input type="number" id="book-id" name="book_id" placeholder="e.g. 101" required min="1">
                                <span class="input-icon">#</span>
                            </div>
                            <span class="error-msg" id="error-book-id"></span>
                        </div>

                        <!-- Title -->
                        <div class="input-group">
                            <label for="title">Book Title</label>
                            <div class="input-wrapper">
                                <input type="text" id="title" name="title" placeholder="e.g. Python Programming" required>
                                <svg class="input-svg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                                </svg>
                            </div>
                            <span class="error-msg" id="error-title"></span>
                        </div>

                        <!-- Author -->
                        <div class="input-group">
                            <label for="author">Author</label>
                            <div class="input-wrapper">
                                <input type="text" id="author" name="author" placeholder="e.g. Guido Rossum" required>
                                <svg class="input-svg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                </svg>
                            </div>
                            <span class="error-msg" id="error-author"></span>
                        </div>

                        <!-- Double Row: Category & Publisher -->
                        <div class="form-row">
                            <div class="input-group">
                                <label for="category">Category</label>
                                <div class="input-wrapper">
                                    <input type="text" id="category" name="category" placeholder="e.g. Programming" list="category-list" required>
                                    <datalist id="category-list">
                                        <option value="Programming">
                                        <option value="Web Development">
                                        <option value="Database">
                                        <option value="Frontend">
                                        <option value="Backend">
                                    </datalist>
                                    <svg class="input-svg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                    </svg>
                                </div>
                                <span class="error-msg" id="error-category"></span>
                            </div>

                            <div class="input-group">
                                <label for="publisher">Publisher</label>
                                <div class="input-wrapper">
                                    <input type="text" id="publisher" name="publisher" placeholder="e.g. Tech Books" required>
                                    <svg class="input-svg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                                    </svg>
                                </div>
                                <span class="error-msg" id="error-publisher"></span>
                            </div>
                        </div>

                        <!-- Double Row: Price & Quantity -->
                        <div class="form-row">
                            <div class="input-group">
                                <label for="price">Price (₹)</label>
                                <div class="input-wrapper">
                                    <input type="number" id="price" name="price" placeholder="e.g. 799" required min="0" step="0.01">
                                    <span class="input-icon">₹</span>
                                </div>
                                <span class="error-msg" id="error-price"></span>
                            </div>

                            <div class="input-group">
                                <label for="quantity">Quantity</label>
                                <div class="input-wrapper">
                                    <input type="number" id="quantity" name="quantity" placeholder="e.g. 25" required min="0">
                                    <svg class="input-svg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                                    </svg>
                                </div>
                                <span class="error-msg" id="error-quantity"></span>
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="btn-group">
                            <button type="submit" id="submit-btn" class="btn btn-primary">
                                <span class="btn-text">Add Book</span>
                                <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                                </svg>
                            </button>
                            <button type="button" id="cancel-btn" class="btn btn-secondary hidden">
                                Cancel
                            </button>
                        </div>
                    </form>
                </div>
            </section>

            <!-- Right Side: Book List (Dynamic Grid) -->
            <section class="list-container">
                <div class="list-header">
                    <h2>Book Catalog</h2>
                    <span id="book-count" class="badge badge-info">0 Books</span>
                </div>

                <!-- Empty State -->
                <div id="empty-state" class="empty-state">
                    <svg class="empty-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                    <h3>No books cataloged yet</h3>
                    <p>Add books using the registration form on the left.</p>
                </div>

                <!-- Loading State -->
                <div id="loading" class="loading hidden">
                    <div class="spinner"></div>
                    <p>Loading database records...</p>
                </div>

                <!-- Books List Container -->
                <div id="books-list" class="books-grid"></div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
