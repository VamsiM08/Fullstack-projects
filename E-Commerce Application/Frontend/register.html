<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register a new customer account on AetherShop.">
    <title>Register Account - AetherShop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="navbar" id="main-navbar">
            <a href="index.html" class="logo" id="nav-logo">
                ⚡ <span>Aether</span>Shop
            </a>
            <ul class="nav-links" id="nav-links"></ul>
            <div class="nav-right" id="nav-right"></div>
        </nav>
    </header>

    <main class="container">
        <section class="form-card" id="register-section">
            <h1 class="form-title">Create Account</h1>
            
            <form id="register-form">
                <div class="form-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" placeholder="John Doe" required>
                </div>
                
                <div class="form-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" placeholder="john@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="reg-phone">Phone Number</label>
                    <input type="tel" id="reg-phone" placeholder="9876543210" required>
                </div>
                
                <div class="form-group">
                    <label for="reg-address">Delivery Address</label>
                    <textarea id="reg-address" placeholder="Specify your shipping address" required style="height: 60px;"></textarea>
                </div>
                
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" placeholder="••••••••" required>
                </div>
                
                <div class="form-group">
                    <label for="reg-confirm-password">Confirm Password</label>
                    <input type="password" id="reg-confirm-password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="form-submit-btn" id="register-submit-btn">Register</button>
            </form>
            
            <div class="form-footer">
                <p>Already have an account? <a href="login.html">Sign In</a></p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 AetherShop Inc. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('register-form');
            if (form) {
                form.onsubmit = async (e) => {
                    e.preventDefault();
                    const fullName = document.getElementById('reg-name').value.trim();
                    const email = document.getElementById('reg-email').value.trim();
                    const phone = document.getElementById('reg-phone').value.trim();
                    const address = document.getElementById('reg-address').value.trim();
                    const password = document.getElementById('reg-password').value;
                    const confirmPassword = document.getElementById('reg-confirm-password').value;
                    
                    if (password !== confirmPassword) {
                        showToast('Passwords do not match', 'error');
                        return;
                    }
                    
                    const payload = {
                        full_name: fullName,
                        email: email,
                        phone: phone,
                        address: address,
                        password: password
                    };
                    
                    try {
                        await apiCall('/customers/add/', 'POST', payload);
                        showToast('Registration successful! Please login.', 'success');
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 1500);
                    } catch (err) {
                        console.error(err);
                    }
                };
            }
        });
    </script>
</body>
</html>
