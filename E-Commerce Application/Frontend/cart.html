<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View items in your shopping cart. Adjust quantity or remove items before proceeding to checkout.">
    <title>Shopping Cart - AetherShop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="navbar" id="main-navbar">
            <a href="index.html" class="logo" id="nav-logo">
                ⚡ <span>Aether</span>Shop
            </a>
            <ul class="nav-links" id="nav-links"></ul>
            <div class="nav-right" id="nav-right"></div>
        </nav>
    </header>

    <main class="container">
        <h1 style="font-size:2.2rem; font-weight:800; margin-bottom:2rem;">Shopping Cart</h1>
        
        <div class="cart-layout" id="cart-layout-container">
            <div class="cart-items-container" id="cart-items-list">
                <!-- Cart items loaded dynamically -->
            </div>
            
            <div class="cart-summary" id="cart-summary-box">
                <!-- Price details loaded dynamically -->
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 AetherShop Inc. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
