<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse gourmet restaurants. Filter by cuisine type and find the top-rated kitchens.">
    <title>Browse Restaurants - FoodExpress</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="restaurants">

    <header id="main-header"></header>

    <main class="container">
        <div class="section-header" style="margin-bottom: 20px;">
            <h2>Explore Restaurants</h2>
            <p style="color: var(--text-muted);">Find local favorites and top-rated kitchens nearby</p>
        </div>

        <!-- Filters Toolbar -->
        <div class="search-filter-section" style="flex-direction: row; align-items: center; justify-content: space-between; flex-wrap: wrap;">
            <div class="search-bar-wrapper" style="margin: 0; max-width: 450px;">
                <i class="fas fa-search"></i>
                <input type="text" id="restaurants-search" placeholder="Search by name or location...">
            </div>
            
            <div style="display: flex; gap: 15px; align-items: center;">
                <label for="filter-cuisine" style="font-size: 14px; font-weight: 600; color: var(--text-muted);">Cuisine:</label>
                <select id="filter-cuisine" style="background: var(--bg-card); border: 1px solid var(--border); padding: 10px 16px; border-radius: 12px; color: white; outline: none; cursor: pointer;">
                    <option value="All">All Cuisines</option>
                    <option value="South Indian">South Indian</option>
                    <option value="American">American Fast Food</option>
                    <option value="Italian">Italian</option>
                    <option value="Mughlai">Mughlai</option>
                    <option value="Dessert">Desserts</option>
                </select>
            </div>
        </div>

        <div class="grid-layout" id="restaurants-grid" style="margin-top: 30px;">
            <!-- Restaurant Cards injected here by script.js -->
        </div>
    </main>

    <footer>
        <div class="container footer-content">
            <div class="logo"><i class="fas fa-hamburger"></i> Food<span>Express</span></div>
            <p>&copy; 2026 FoodExpress. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
