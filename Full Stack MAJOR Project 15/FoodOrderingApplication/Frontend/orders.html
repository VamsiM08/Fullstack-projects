<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View and track your current food orders and review previous food orders.">
    <title>My Orders - FoodExpress</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="orders">

    <header id="main-header"></header>

    <main class="container" style="max-width: 900px;">
        <div class="section-header" style="margin-bottom: 30px;">
            <h2>Track Your Orders</h2>
        </div>

        <!-- Active Orders Section -->
        <div style="margin-bottom: 50px;">
            <h3 style="font-size: 22px; margin-bottom: 20px; border-left: 4px solid var(--primary); padding-left: 12px; color: white;">Active Orders</h3>
            <div id="active-orders-list">
                <!-- Injected dynamically: order cards with timelines -->
            </div>
        </div>

        <!-- Past Orders Section -->
        <div>
            <h3 style="font-size: 22px; margin-bottom: 20px; border-left: 4px solid var(--text-muted); padding-left: 12px; color: white;">Previous Orders</h3>
            <div id="past-orders-list">
                <!-- Injected dynamically -->
            </div>
        </div>
    </main>

    <footer>
        <div class="container footer-content">
            <div class="logo"><i class="fas fa-hamburger"></i> Food<span>Express</span></div>
            <p>&copy; 2026 FoodExpress. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
