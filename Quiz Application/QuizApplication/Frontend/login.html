<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Q-Master Online Quiz Management System</title>
    <meta name="description" content="Sign in to your Q-Master account to access quizzes, view performance analytics, and manage exams.">
    <link rel="stylesheet" href="style.css">
</head>
<body id="login-page">

    <header>
        <nav class="navbar">
            <a href="index.html" class="logo" id="logo-link">
                <span>⚡</span> Q-Master
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="register.html" class="btn btn-secondary">Register</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="glass-card auth-form-container">
            <h2>Account Login</h2>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="role">Select Role</label>
                    <select id="role" class="form-control">
                        <option value="student">Student</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your registered email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" id="submit-login-btn">Login</button>
            </form>
            
            <div class="auth-links" id="auth-switch-link">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Q-Master Quiz Systems. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
